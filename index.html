    function onResize() { setIsWide(window.innerWidth > 900); }
    window.addEventListener("resize", onResize);
    return function() { window.removeEventListener("resize", onResize); };
  }, []);

  useEffect(function() {
    var minShown = false;
    var loaded = false;
    var done = false;

    // Minimum splash display: 800ms so user sees the brand
    var minTimer = setTimeout(function(){ minShown = true; tryTransition(); }, 800);

    // Detect actual readiness: fonts + document ready
    function checkLoaded() {
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function() { loaded = true; tryTransition(); });
      } else {
        loaded = true; tryTransition();
      }
    }
    if (document.readyState === "complete") { checkLoaded(); }
    else { window.addEventListener("load", checkLoaded); }

    // Sequential: splash exit → wait → hub logo → wait → cards
    function tryTransition() {
      if (done || !minShown || !loaded) return;
      done = true;
      // Step 1: splash logo starts exiting (fades/moves up)
      setSplash("exit");
      // Step 2: splash fully gone, then show hub logo after 500ms
      setTimeout(function(){ setSplash("done"); }, 900);
      setTimeout(function(){ setHubPhase("logo"); }, 1900); // 900 + 1000ms gap after splash gone
      // Step 3: cards appear 1500ms after hub logo
      setTimeout(function(){ setHubPhase("cards"); }, 3400); // 1900 + 1500ms
    }

    return function() {
      clearTimeout(minTimer);
      window.removeEventListener("load", checkLoaded);
    };

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: 20, fontWeight: 900, fontStyle: "italic", color: "var(--text)" }}>⚙️ Settings</h2>
            <button onClick={function(){ setShowSettings(false); }} style={{ width: 32, height: 32, borderRadius: 8, background: "var(--surface2)", border: "1px solid var(--border)", color: "var(--dim)", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
          </div>
          {/* SAFE MODE - instant toggle, no confirm */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", background: "var(--surface2)", borderRadius: 12, border: "1px solid var(--border)", marginBottom: 10 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span style={{ fontSize: 18 }}>🛡️</span>
                <span style={{ fontWeight: 700, fontSize: 14, color: "var(--text)" }}>Safe Mode</span>
              </div>
              <div style={{ fontSize: 11, color: "var(--dim)", lineHeight: 1.4, maxWidth: 200 }}>Switches to skill-based games. No gambling content shown.</div>
            </div>
            <button onClick={function(){ var next = !safeMode; setSafeMode(next); if (next) setGame(null); setModeKey(function(k){ return k + 1; }); }} style={{ width: 48, height: 28, borderRadius: 14, background: safeMode ? "var(--green)" : "var(--surface)", border: safeMode ? "2px solid var(--green)" : "2px solid var(--border)", position: "relative", transition: "all 0.3s", flexShrink: 0 }}>
              <div style={{ width: 20, height: 20, borderRadius: "50%", background: "#fff", position: "absolute", top: 2, left: safeMode ? 24 : 2, transition: "left 0.3s cubic-bezier(0.34,1.56,0.64,1)", boxShadow: "0 1px 4px rgba(0,0,0,0.3)" }} />
            </button>
          </div>
          {/* REDUCE ANIMATIONS - needs confirm */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", background: "var(--surface2)", borderRadius: 12, border: "1px solid var(--border)" }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span style={{ fontSize: 18 }}>🔋</span>
                <span style={{ fontWeight: 700, fontSize: 14, color: "var(--text)" }}>Reduce Animations</span>
              </div>
              <div style={{ fontSize: 11, color: "var(--dim)", lineHeight: 1.4, maxWidth: 200 }}>Reduces visual effects for older devices. Less fluid but better performance.</div>
            </div>
            <button onClick={function(){ setConfirmToggle(reduceAnim ? "reduceOff" : "reduceOn"); }} style={{ width: 48, height: 28, borderRadius: 14, background: reduceAnim ? "var(--neon2)" : "var(--surface)", border: reduceAnim ? "2px solid var(--neon2)" : "2px solid var(--border)", position: "relative", transition: "all 0.3s", flexShrink: 0 }}>
              <div style={{ width: 20, height: 20, borderRadius: "50%", background: "#fff", position: "absolute", top: 2, left: reduceAnim ? 24 : 2, transition: "left 0.3s cubic-bezier(0.34,1.56,0.64,1)", boxShadow: "0 1px 4px rgba(0,0,0,0.3)" }} />
            </button>
          </div>
          <div style={{ marginTop: 16, textAlign: "center", display: "flex", gap: 8, justifyContent: "center" }}>
            <button onClick={function(){ setShowInfo(true); setShowSettings(false); }} style={{ padding: "10px 20px", borderRadius: 10, fontSize: 14, fontWeight: 700, background: "var(--surface2)", color: "var(--dim)", border: "1px solid var(--border)" }}>ℹ️ Credits</button>
            <button onClick={function(){ setShowSettings(false); }} style={{ padding: "10px 32px", borderRadius: 10, fontSize: 14, fontWeight: 700, background: "linear-gradient(135deg,#c084fc,#818cf8)", color: "#fff", border: "2px solid #8b5cf6" }}>Done</button>
          </div>
          <div style={{ marginTop: 14, textAlign: "center", fontSize: 11, color: "var(--dim)", opacity: 0.5, fontFamily: "'JetBrains Mono',monospace" }}>Flux {VERSION}</div>
        </>}
        {confirmToggle !== null && <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>{confirmToggle === "reduceOn" ? "🔋" : "✨"}</div>
          <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 18, fontWeight: 900, fontStyle: "italic", color: "var(--text)", marginBottom: 8 }}>{confirmToggle === "reduceOn" ? "Reduce Animations?" : "Restore Animations?"}</div>
          <p style={{ fontSize: 13, color: "var(--dim)", lineHeight: 1.5, marginBottom: 20 }}>{confirmToggle === "reduceOn" ? "This will reduce background effects, card transitions, and visual flair. Recommended for older or slower devices." : "This will restore all animations, background effects, and visual transitions. May use more device resources."}</p>
          <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
            <button onClick={function(){ setConfirmToggle(null); }} style={{ padding: "10px 24px", borderRadius: 10, fontSize: 14, fontWeight: 700, background: "var(--surface2)", color: "var(--dim)", border: "2px solid var(--border)" }}>Cancel</button>
            <button onClick={function(){ setReduceAnim(confirmToggle === "reduceOn"); setConfirmToggle(null); }} style={{ padding: "10px 24px", borderRadius: 10, fontSize: 14, fontWeight: 700, background: confirmToggle === "reduceOn" ? "var(--neon2)" : "var(--green)", color: "#fff", border: "2px solid " + (confirmToggle === "reduceOn" ? "var(--neon2)" : "var(--green)") }}>Yes, {confirmToggle === "reduceOn" ? "Reduce" : "Restore"}</button>
          </div>
        </div>}
      </div>
    </div>}
    {showInfo && <InfoPanel onClose={function(){ setShowInfo(false); }} />}
    {debtPopup && <DebtPopup onDebt={function(){ debtPopup.onDebt(); setDebtPopup(null); }} onAfford={function(){ debtPopup.onAfford(); setDebtPopup(null); }} onCancel={function(){ setDebtPopup(null); }} />}
  </Wrap>;
}

function Wrap({ children }) {
  return <div style={{ minHeight: "100vh", minWidth: "100vw", background: "#050508", color: "var(--text)", fontFamily: "'Outfit',sans-serif", position: "relative", overflow: "hidden" }}>
    <link href={FONTS_URL} rel="stylesheet" />
    <style>{CSS}</style>
    <Starfield />
    <div style={{ position: "relative", zIndex: 1 }}>{children}</div>
  </div>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<FluxApp />);
document.getElementById("loading").classList.add("hide");
setTimeout(function() { var el = document.getElementById("loading"); if (el) el.remove(); }, 600);
  </script>
</body>
</html>
