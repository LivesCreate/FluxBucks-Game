/* ═══ TIER SYSTEM (Feature 3) ═══════════════════════════════════ */
var TIERS = [
  { name: "Bronze", min: 0, color: "#cd7f32", icon: "\uD83E\uDD49" },
  { name: "Silver", min: 1000, color: "#c0c0c0", icon: "\uD83E\uDD48" },
  { name: "Gold", min: 5000, color: "#ffd700", icon: "\uD83E\uDD47" },
  { name: "Platinum", min: 20000, color: "#40e0d0", icon: "\uD83D\uDC8E" },
  { name: "Diamond", min: 50000, color: "#b9f2ff", icon: "\u2B50" },
  { name: "Master", min: 100000, color: "#ff6b6b", icon: "\uD83D\uDC51" }
];
function getTier(lifetimeXp) {
  var tier = TIERS[0];
  for (var i = TIERS.length - 1; i >= 0; i--) {
    if (lifetimeXp >= TIERS[i].min) { tier = TIERS[i]; break; }
  }
  return tier;
}
function getTierProgress(lifetimeXp) {
  var current = getTier(lifetimeXp);
  var nextIdx = TIERS.indexOf(current) + 1;
  if (nextIdx >= TIERS.length) return { current: current, next: null, progress: 1 };
  var next = TIERS[nextIdx];
  var progress = (lifetimeXp - current.min) / (next.min - current.min);
  return { current: current, next: next, progress: Math.min(1, progress) };
}

/* ═══ PASSIVE INCOME / BANK INTEREST ════════════════════════════ */
/* Harder to obtain: time-gated tiers, max 500 chips, balance decay after 48h */
var PASSIVE_COOLDOWN_MS = 1 * 60 * 60 * 1000; /* 1 hour minimum */
var PASSIVE_MAX = 500;
var PASSIVE_TIER_BONUS = { "Bronze": 1, "Silver": 1.15, "Gold": 1.3, "Platinum": 1.5, "Diamond": 1.75, "Master": 2 };
function calcPassiveIncome(balance, tierName, hoursAway) {
  /* Time-based brackets: longer away = more, but caps at 500 */
  var base = 0;
  if (hoursAway < 1) return 0;
  else if (hoursAway < 4) base = Math.floor(hoursAway * 2); /* 1-4h: 2-7 chips */
  else if (hoursAway < 12) base = Math.floor(8 + (hoursAway - 4) * 5); /* 4-12h: 8-48 chips */
  else if (hoursAway < 24) base = Math.floor(48 + (hoursAway - 12) * 12); /* 12-24h: 48-192 chips */
  else if (hoursAway < 48) base = Math.floor(192 + (hoursAway - 24) * 8); /* 24-48h: 192-384 chips */
  else base = Math.min(450, Math.floor(384 + (hoursAway - 48) * 2)); /* 48h+: slow climb to ~450 */
  /* Tier multiplier */
  var mult = PASSIVE_TIER_BONUS[tierName] || 1;
  var total = Math.floor(base * mult);
  return Math.min(PASSIVE_MAX, Math.max(0, total));
}
function calcBalanceDecay(balance, hoursAway) {
  /* After 48 hours away, lose 1% of balance per day beyond 48h */
  if (hoursAway <= 48) return 0;
  var extraDays = (hoursAway - 48) / 24;
  var decayRate = 0.01 * extraDays; /* 1% per day */
  var loss = Math.floor(balance * Math.min(0.25, decayRate)); /* Cap at 25% loss */
  return Math.max(0, loss);
}

function getWeekStr() {

var WEEKLY_TEMPLATES = [

  { type: "comboStreak", count: 5, reward: 1000, desc: "Play 5 different games in one session" },
];
function generateWeeklyMissions(weekStr) {
  var seed = 0;
  for (var i = 0; i < weekStr.length; i++) seed = seed * 31 + weekStr.charCodeAt(i);
  seed = Math.abs(seed);
  var missions = [];
  var usedTypes = {};
  var pool = WEEKLY_TEMPLATES.slice();
  for (var m = 0; m < 3; m++) {
    var filtered = pool.filter(function(t) { return !usedTypes[t.type]; });
    if (filtered.length === 0) filtered = pool;
    var idx = (seed + m * 137 + m * m * 53) % filtered.length;
    var template = filtered[idx];
    usedTypes[template.type] = true;
    missions.push({ id: m, type: template.type, count: template.count || 0, amount: template.amount || 0, reward: template.reward, desc: template.desc });
  }
  return missions;
}

/* ═══ ERROR LOGGING (Feature 8) ═══════════════════════════════════ */
var ERROR_LOGGING_ENABLED = true;
var _errorCount = 0;
var _errorResetTimer = null;
var _recentErrors = {};
function logError(info) {
  try {
    if (!ERROR_LOGGING_ENABLED || !fbAvailable || !fbDb) return;
    if (_errorCount >= 5) return;
    var msg = (info.message || "").slice(0, 200);
    if (!msg) return;
    var now = Date.now();
    if (_recentErrors[msg] && now - _recentErrors[msg] < 300000) return;
    _recentErrors[msg] = now;
    _errorCount++;
    if (!_errorResetTimer) {
      _errorResetTimer = setInterval(function () { _errorCount = 0; }, 60000);
    }
    var uid = "anonymous";
    try { if (fbAuth && fbAuth.currentUser) uid = fbAuth.currentUser.uid; } catch(e) {}
    fbDb.collection("errorLogs").add({
      message: msg,
      stack: (info.stack || "").slice(0, 500),
      source: (info.source || "").slice(0, 200),
      line: info.lineno || 0,
      col: info.colno || 0,
      userId: uid,
      version: typeof VERSION !== "undefined" ? VERSION : "unknown",
      userAgent: (navigator.userAgent || "").slice(0, 200),
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(){});
  } catch(e) {}
  try { if (typeof Sentry !== "undefined" && Sentry.captureMessage) { Sentry.captureMessage(msg, "error"); } } catch(e2) {}
}
function initErrorLogging() {
  if (!ERROR_LOGGING_ENABLED) return;
  window.onerror = function(message, source, lineno, colno, error) {
    logError({ message: message, source: source, lineno: lineno, colno: colno, stack: error && error.stack });
  };
  window.onunhandledrejection = function(event) {
    logError({ message: event.reason && event.reason.message || String(event.reason), stack: event.reason && event.reason.stack });
  };
}

function fbGetChallenges(uid) {
  if (!fbAvailable || !fbDb || !uid) return Promise.resolve([]);
  var q1 = fbDb.collection("challenges").where("from", "==", uid).get();
  var q2 = fbDb.collection("challenges").where("to", "==", uid).get();
  return Promise.all([q1, q2]).then(function(results) {
    var all = [];
    results[0].forEach(function(d) { all.push(Object.assign({ id: d.id }, d.data())); });
    results[1].forEach(function(d) { all.push(Object.assign({ id: d.id }, d.data())); });
    /* Dedupe */
    var seen = {};
    return all.filter(function(c) { if (seen[c.id]) return false; seen[c.id] = true; return true; });
  }).catch(function() { return []; });
}
function fbUpdateChallengeScore(challengeId, uid, score) {
  if (!fbAvailable || !fbDb) return;
  fbDb.collection("challenges").doc(challengeId).get().then(function(snap) {
    if (!snap.exists) return;
    var data = snap.data();
    var updates = {};
    if (data.from === uid) updates.fromScore = Math.max(data.fromScore || 0, score);
    if (data.to === uid) updates.toScore = Math.max(data.toScore || 0, score);
    if (data.status === "pending") updates.status = "active";
    fbDb.collection("challenges").doc(challengeId).update(updates).catch(function(){});
  }).catch(function(){});
}
function checkExpiredChallenges(challenges) {
  var now = Date.now();
  challenges.forEach(function(c) {
    if (c.status !== "pending" && c.status !== "active") return;
    var expires = c.expiresAt && c.expiresAt.toDate ? c.expiresAt.toDate().getTime() : (c.expiresAt || 0);
    if (now > expires) {
      if (fbAvailable && fbDb) {
        fbDb.collection("challenges").doc(c.id).update({ status: "expired" }).catch(function(){});
      }
    }
  });
}

function updateNetStatus() {
  netStatus.online = navigator.onLine;

  if (conn) {

    netStatus.downlink = conn.downlink || null;
    netStatus.saveData = conn.saveData || false;
  }
}

if (typeof window !== "undefined") {

  window.addEventListener("offline", function () { updateNetStatus(); if (window.__onNetChange) window.__onNetChange(); });
  var _conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (_conn && _conn.addEventListener) _conn.addEventListener("change", function () { updateNetStatus(); if (window.__onNetChange) window.__onNetChange(); });
}

/* Returns sync interval in ms based on connection quality and data saver mode */
function getSyncInterval(isDataSaver) {
  if (!netStatus.online) return 0;
  if (isDataSaver || netStatus.saveData) return 30000;

var _audioCtx = null;
function getAudio() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
function playSound(type) {
  try {
    if (window.__fluxSoundOff) return;
    var ctx = getAudio();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.value = 0.08;
    if (type === "win") {
      osc.frequency.value = 523;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
      var o2 = ctx.createOscillator();
      var g2 = ctx.createGain();
      o2.connect(g2);
      g2.connect(ctx.destination);
      o2.frequency.value = 659;
      o2.type = "sine";
      g2.gain.setValueAtTime(0.08, ctx.currentTime + 0.1);
      g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      o2.start(ctx.currentTime + 0.1);
      o2.stop(ctx.currentTime + 0.5);
    } else if (type === "lose") {
      osc.frequency.value = 220;
      osc.type = "sawtooth";
      gain.gain.setValueAtTime(0.06, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } else if (type === "click") {
      osc.frequency.value = 800;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.04, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.08);
    } else if (type === "flip") {
      osc.frequency.value = 600;
      osc.type = "triangle";
      gain.gain.setValueAtTime(0.05, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.15);
    } else if (type === "cash") {
      osc.frequency.value = 440;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.06, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(880, ctx.currentTime + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } else if (type === "reveal") {
      osc.frequency.value = 350 + Math.random() * 300;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.04, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.12);
    } else if (type === "jackpot") {
      [523, 659, 784, 1047].forEach(function (f, i) {
        var o = ctx.createOscillator();
        var g = ctx.createGain();
        o.connect(g);
        g.connect(ctx.destination);
        o.frequency.value = f;
        o.type = "sine";
        g.gain.setValueAtTime(0.08, ctx.currentTime + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.12 + 0.4);
        o.start(ctx.currentTime + i * 0.12);
        o.stop(ctx.currentTime + i * 0.12 + 0.4);
      });
    } else if (type === "tap") {
      osc.frequency.value = 1200;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.025, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.04);
    } else if (type === "xpGain") {
      osc.frequency.value = 880;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.04, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(1100, ctx.currentTime + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    } else if (type === "xpLose") {
      osc.frequency.value = 400;
      osc.type = "triangle";
      gain.gain.setValueAtTime(0.03, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(250, ctx.currentTime + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    } else if (type === "streak") {
      [660, 880, 1100].forEach(function (f, i) {
        var o = ctx.createOscillator();
        var g = ctx.createGain();
        o.connect(g);
        g.connect(ctx.destination);
        o.frequency.value = f;
        o.type = "sine";
        g.gain.setValueAtTime(0.06, ctx.currentTime + i * 0.1);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.1 + 0.25);
        o.start(ctx.currentTime + i * 0.1);
        o.stop(ctx.currentTime + i * 0.1 + 0.25);
      });
    }
  } catch (e) {}
}
