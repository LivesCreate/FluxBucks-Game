function checkAchievements(save, event) {
  var newAch = [];
  var ach = save.achievements || [];
  var s = save.stats || DEFAULT_SAVE.stats;
  function has(id) {
    return ach.indexOf(id) >= 0;
  }
  function add(id) {
    if (!has(id)) {
      newAch.push(id);
    }
  }
  if (event.type === "win") {
    add("first_win");
  }
  if (event.type === "lose") {
    add("first_loss");
  }
  if (event.bet >= 100) add("high_roller");
  if (event.bet >= 500) add("whale");
  if (save.chips <= 0 && event.type === "lose") add("broke");
  if (save.chips < 0) add("debt");
  if (event.type === "win" && event.prevChips <= 0) add("comeback");
  if (save.chips >= 1000) add("rich");
  if (save.chips >= 5000) add("mega_rich");
  if (event.game === "blackjack" && event.isBlackjack) add("blackjack");
  if (event.game === "blackjack" && event.isBust) add("bust");
  if (s.currentWinStreak >= 3) add("win_streak_3");
  if (s.currentWinStreak >= 5) add("win_streak_5");
  if (s.currentWinStreak >= 10) add("win_streak_10");
  if (s.currentLoseStreak >= 5) add("lose_streak_5");
  if (s.gamesPlayed >= 10) add("games_10");
  if (s.gamesPlayed >= 50) add("games_50");
  if (s.gamesPlayed >= 100) add("games_100");
  if (event.type === "win" && event.profit >= 500) add("big_win");
  if (event.type === "win" && event.profit >= 1000) add("mega_win");
  if (event.isAllIn && event.type === "win") add("all_in_win");
  if (event.game === "dice" && event.roll === 77.7) add("dice_777");
  if (event.game === "typingspeed" && event.wpm >= 50) add("typing_50");
  if (event.game === "typingspeed" && event.wpm >= 80) add("typing_80");
  if (event.game === "typingspeed" && event.wpm >= 100) add("typing_100");
  if (event.game === "reaction" && event.ms && event.ms < 200) add("reaction_200");
  if (event.game === "reaction" && event.ms && event.ms < 300) add("reaction_300");
  if (event.game === "memory" && event.perfectRound) add("memory_perfect");
  if (event.game === "keno" && event.hits === 10) add("keno_10");
  if (event.game === "plinko" && event.hitMax) add("plinko_edge");
